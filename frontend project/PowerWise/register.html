<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PowerWise | Register</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- CSS -->

<link rel="stylesheet"
href="css/register.css">

</head>

<body>

<section class="register-section">

<div class="container">

<div class="row align-items-center min-vh-100">

<!-- LEFT -->

<div class="col-lg-6 text-center text-white">

<i class="bi bi-lightning-charge-fill hero-icon"></i>

<h1 class="fw-bold mt-4">

Join

<span class="text-warning">

PowerWise

</span>

</h1>

<p class="lead">

Smart Electricity Monitoring System

</p>

<p>

Create your account and start monitoring your electricity usage intelligently.

</p>

</div>

<!-- RIGHT -->

<div class="col-lg-6">

<div class="register-card shadow">

<div class="text-center mb-4">

<i class="bi bi-person-plus-fill register-icon"></i>

<h2 class="fw-bold mt-3">

Create Account

</h2>

</div>

<form id="registerForm">

<!-- Name -->

<div class="mb-3">

<label>

Full Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
id="name"
class="form-control"
required>

</div>

</div>

<!-- Email -->

<div class="mb-3">

<label>

Email

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-envelope-fill"></i>

</span>

<input
type="email"
id="email"
class="form-control"
required>

</div>

</div>

<!-- Phone -->

<div class="mb-3">

<label>

Phone Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-telephone-fill"></i>

</span>

<input
type="tel"
id="phone"
class="form-control"
maxlength="10"
required>

</div>

</div>

<!-- Password -->

<div class="mb-3">

<label>

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
id="password"
class="form-control"
required>

<button
type="button"
class="btn btn-outline-secondary"
id="togglePassword">

<i class="bi bi-eye-fill"></i>

</button>

</div>

<div class="progress mt-2">

<div
id="strengthBar"
class="progress-bar bg-danger"
style="width:0%">

</div>

</div>

<small id="strengthText">

Password Strength

</small>

</div>

<!-- Confirm -->

<div class="mb-3">

<label>

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
class="form-control"
required>

</div>

<!-- Terms -->

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="terms">

<label class="form-check-label">

I agree to the Terms & Conditions

</label>

</div>

<button
type="submit"
class="btn btn-primary w-100">

<i class="bi bi-person-check-fill"></i>

Register

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/register.js"></script>

</body>

</html>
