<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PowerWise | Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <!-- ================= HERO SECTION ================= -->

    <section class="login-section">

        <div class="container">

            <div class="row align-items-center min-vh-100">

                <!-- LEFT SIDE -->

                <div class="col-lg-6 text-center hero-side">

                    <div class="hero-content">

                        <i class="bi bi-lightning-charge-fill hero-icon"></i>

                        <h1 class="display-4 fw-bold mt-4">

                            Welcome to

                            <span class="text-warning">

                                PowerWise

                            </span>

                        </h1>

                        <p class="lead mt-3">

                            Smart Electricity Monitoring System

                        </p>

                        <p class="hero-text">

                            Track electricity usage, estimate monthly bills,

                            monitor appliances and save energy intelligently.

                        </p>

                    </div>

                </div>

                <!-- RIGHT SIDE -->

                <div class="col-lg-6">

                    <div class="login-card shadow-lg">

                        <div class="text-center mb-4">

                            <i class="bi bi-person-circle login-user"></i>

                            <h2 class="fw-bold mt-3">

                                Login

                            </h2>

                            <p class="text-muted">

                                Login to continue

                            </p>

                        </div>

                        <form id="loginForm">

                            <!-- Email -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-envelope-fill"></i>

                                    </span>

                                    <input

                                        type="email"

                                        id="email"

                                        class="form-control"

                                        placeholder="Enter your email"

                                        required>

                                </div>

                            </div>

                            <!-- Password -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-lock-fill"></i>

                                    </span>

                                    <input

                                        type="password"

                                        id="password"

                                        class="form-control"

                                        placeholder="Enter your password"

                                        required>

                                    <button

                                        type="button"

                                        class="btn btn-outline-secondary"

                                        id="togglePassword">

                                        <i class="bi bi-eye-fill"></i>

                                    </button>

                                </div>

                            </div>

                            <!-- Remember -->

                            <div class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">

                                    <input

                                        class="form-check-input"

                                        type="checkbox"

                                        id="remember">

                                    <label class="form-check-label">

                                        Remember Me

                                    </label>

                                </div>

                                <a href="#" class="forgot-link">

                                    Forgot Password?

                                </a>

                            </div>

                            <!-- Login -->

                            <button

                                type="submit"

                                class="btn btn-success w-100 login-btn">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                        </form>

                        <hr>

                        <div class="text-center">

                            <p>

                                Don't have an account?

                            </p>

                            <a

                                href="register.html"

                                class="btn btn-outline-success">

                                Create Account

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login JS -->

    <script src="js/login.js"></script>

</body>

</html>
